<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TeamPulse Sales | Performance Cockpit</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0e12;--surf:#121317;--surf-lo:#1a1b20;--surf-c:#1f1f24;
  --surf-hi:#292a2e;--surf-max:#343439;
  --on:#e3e2e7;--on-dim:#bbcabf;--outline:#86948a;--outv:#3c4a42;
  --primary:#4edea3;--primary-dk:#10b981;--primary-dkr:#059669;--on-primary:#003824;
  --secondary:#ffb3ad;--error:#ef4444;--amber:#f59e0b;--info:#adc6ff;
  --glass:rgba(31,31,36,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Geist',system-ui,sans-serif;background:var(--bg);color:var(--on);min-height:100dvh;overflow-x:hidden;font-size:14px;}
.mso{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-family:'Material Symbols Outlined';font-style:normal;font-size:20px;line-height:1;display:inline-block;vertical-align:middle;}
/* Grid bg */
.grid-bg{background-color:var(--bg);background-image:linear-gradient(rgba(78,222,163,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(78,222,163,.03) 1px,transparent 1px);background-size:40px 40px;}
/* Glass */
.glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);border-left:1px solid rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(0,0,0,.2);}
/* Screens */
.screen{display:none;}
.screen.active{display:block;}
/* Anims */
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.fu{animation:fu .4s ease both;}.fu1{animation:fu .4s .08s ease both;}.fu2{animation:fu .4s .16s ease both;}.fu3{animation:fu .4s .24s ease both;}.fu4{animation:fu .4s .32s ease both;}
.blink{animation:pulse 2s ease-in-out infinite;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
/* Manager panel — always outside all screens, controlled by JS */
#mgr-panel{display:none;}
#mgr-panel.open{display:flex!important;}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;}
.bg{background:rgba(78,222,163,.14);color:var(--primary);border:1px solid rgba(78,222,163,.28);}
.br{background:rgba(239,68,68,.14);color:#f87171;border:1px solid rgba(239,68,68,.28);}
.ba{background:rgba(245,158,11,.11);color:var(--amber);border:1px solid rgba(245,158,11,.28);}
.bx{background:rgba(134,148,138,.1);color:var(--outline);border:1px solid rgba(134,148,138,.22);}
/* Buttons */
.btn-p{background:linear-gradient(135deg,var(--primary),var(--primary-dk));color:var(--on-primary);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;border:none;cursor:pointer;border-radius:8px;padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:8px;transition:box-shadow .25s,transform .15s;width:100%;font-family:'Geist',sans-serif;}
.btn-p:hover{box-shadow:0 0 24px rgba(78,222,163,.3);}
.btn-p:active{transform:scale(.98);}
.btn-g{background:transparent;color:var(--on-dim);font-size:12px;font-weight:600;border:1px solid var(--outv);cursor:pointer;border-radius:8px;padding:7px 14px;transition:all .2s;font-family:'Geist',sans-serif;}
.btn-g:hover{color:var(--primary);border-color:var(--primary);}
.btn-s{background:var(--surf-lo);color:var(--on);font-size:12px;font-weight:600;border:1px solid rgba(60,74,66,.5);cursor:pointer;border-radius:8px;padding:9px 16px;display:flex;align-items:center;gap:8px;transition:all .2s;font-family:'Geist',sans-serif;}
.btn-s:hover{background:var(--surf-c);border-color:rgba(78,222,163,.3);}
/* Inputs */
.inp{width:100%;background:var(--bg);border:1px solid rgba(60,74,66,.45);border-radius:8px;padding:12px 16px;color:var(--on);font-family:'Geist',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--primary);}
.inp::placeholder{color:rgba(187,202,191,.38);}
/* ═══ LOGIN ═══ */
#sl{align-items:center;justify-content:center;min-height:100dvh;padding:24px;}
#sl.active{display:flex;}
.l-wrap{width:100%;max-width:440px;z-index:10;}
.l-logo{font-size:clamp(28px,6vw,48px);font-weight:800;letter-spacing:-.025em;color:var(--primary);text-align:center;margin-bottom:4px;}
.l-sub{text-align:center;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--on-dim);margin-bottom:40px;}
.l-card{padding:40px;border-radius:16px;position:relative;overflow:hidden;}
.l-glow{position:absolute;top:-80px;right:-80px;width:200px;height:200px;background:rgba(78,222,163,.08);border-radius:50%;filter:blur(60px);pointer-events:none;}
.l-lbl{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--on-dim);margin-bottom:6px;margin-left:2px;}
.l-ig{position:relative;} .l-ig .inp{padding-right:42px;}
.l-ig .mso{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--on-dim);font-size:18px;transition:color .2s;pointer-events:none;}
.l-ig:focus-within .mso{color:var(--primary);}
.l-ig .inp{padding-left:42px;}
.l-row{display:grid;grid-template-columns:1fr 2fr;gap:14px;}
.l-err{color:#f87171;font-size:12px;text-align:center;margin-top:10px;display:none;}
.l-err.on{display:block;}
.l-divider{display:flex;align-items:center;gap:12px;margin:26px 0;}
.l-divider::before,.l-divider::after{content:'';flex:1;height:1px;background:rgba(60,74,66,.3);}
.l-divider span{font-size:10px;color:rgba(187,202,191,.5);letter-spacing:.1em;text-transform:uppercase;}
.mgr-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surf-lo);border:1px solid rgba(60,74,66,.4);border-radius:10px;cursor:pointer;transition:all .2s;font-family:'Geist',sans-serif;}
.mgr-btn:hover{background:var(--surf-c);border-color:rgba(255,179,173,.35);}
.mgr-av{width:32px;height:32px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,179,173,.3);}
.l-footer{display:flex;justify-content:space-between;margin-top:26px;padding:0 4px;}
.l-footer a{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--on-dim);text-decoration:none;transition:color .2s;}
.l-footer a:hover{color:var(--primary);}
/* ═══ DASHBOARD ═══ */
#sd{min-height:100dvh;}
#sd.active{display:flex;flex-direction:column;}
/* Sidebar */
.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;background:var(--surf);border-right:1px solid rgba(60,74,66,.3);display:flex;flex-direction:column;z-index:50;}
.sb-brand{padding:24px 20px 18px;border-bottom:1px solid rgba(60,74,66,.2);}
.sb-name{font-size:15px;font-weight:800;color:var(--primary);letter-spacing:-.01em;}
.sb-sub{font-size:11px;color:var(--on-dim);letter-spacing:.04em;margin-top:2px;}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto;}
.nav-i{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--on-dim);font-size:13px;font-weight:500;margin-bottom:3px;border:none;background:none;width:100%;font-family:'Geist',sans-serif;text-align:left;}
.nav-i:hover{background:rgba(78,222,163,.06);color:var(--on);}
.nav-i.act{background:rgba(78,222,163,.12);color:var(--primary);}
.nav-i .mso{font-size:18px;}
.sb-bot{padding:14px 10px;border-top:1px solid rgba(60,74,66,.2);}
/* Main */
.dmain{margin-left:260px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
/* Top bar */
.topbar{position:sticky;top:0;z-index:40;background:rgba(18,19,23,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(60,74,66,.25);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.tb-logo{font-size:19px;font-weight:800;color:var(--primary);letter-spacing:-.02em;}
.tb-links{display:flex;gap:22px;}
.tb-link{font-size:13px;color:var(--on-dim);cursor:pointer;transition:color .2s;font-weight:500;background:none;border:none;font-family:'Geist',sans-serif;}
.tb-link:hover{color:var(--on);}
.tb-r{display:flex;align-items:center;gap:10px;}
.tb-search{display:flex;align-items:center;gap:8px;background:var(--surf-c);border:1px solid rgba(60,74,66,.4);border-radius:8px;padding:7px 12px;color:var(--on-dim);}
.tb-search input{background:none;border:none;outline:none;color:var(--on);font-family:'Geist',sans-serif;font-size:13px;width:160px;}
.tb-search input::placeholder{color:var(--on-dim);}
.ib{width:36px;height:36px;border-radius:8px;background:var(--surf-c);border:1px solid rgba(60,74,66,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--on-dim);}
.ib:hover{color:var(--on);border-color:rgba(78,222,163,.3);}
.tb-av{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid var(--primary);cursor:pointer;}
/* Mobile header — shown by JS on login, hidden on logout */
.mob-hdr{display:none;position:sticky;top:0;z-index:40;background:rgba(18,19,23,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(60,74,66,.25);padding:12px 16px;align-items:center;justify-content:space-between;}
@media(max-width:768px){.mob-hdr.visible{display:flex;}}
.mob-logo{font-size:17px;font-weight:800;color:var(--primary);}
/* Content */
.dcontent{flex:1;padding:24px;max-width:1400px;width:100%;}
/* ── Top 3 Banner ── */
.t3bar{background:var(--surf-c);border:1px solid rgba(60,74,66,.4);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.t3div{width:1px;height:36px;background:rgba(60,74,66,.5);flex-shrink:0;}
.t3it{display:flex;align-items:center;gap:10px;flex:1;min-width:170px;}
.t3rk{font-size:20px;font-weight:800;color:var(--primary);min-width:28px;}
.t3nm{font-weight:700;font-size:14px;}
.t3st{font-size:11px;color:var(--on-dim);margin-top:1px;}
.t3av{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid rgba(60,74,66,.6);flex-shrink:0;}
.elite-badge{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(78,222,163,.09);border:1px solid rgba(78,222,163,.22);border-radius:8px;padding:8px 12px;flex-shrink:0;}
.elite-txt{font-size:10px;font-weight:700;color:var(--primary);letter-spacing:.08em;text-transform:uppercase;line-height:1.3;}
/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:var(--surf-c);border:1px solid rgba(60,74,66,.4);border-radius:12px;padding:20px;}
.kpi-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--on-dim);margin-bottom:10px;}
.kpi-val{font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1;margin-bottom:6px;}
.kpi-sub{font-size:12px;display:flex;align-items:center;gap:5px;color:var(--on-dim);}
/* Manager grid */
.mgr-grid{display:grid;grid-template-columns:320px 1fr;gap:18px;}
/* Risk cards */
.risk-c{border-radius:12px;padding:14px 16px;border:1px solid;margin-bottom:12px;}
.risk-c.crit{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.3);}
.risk-c.warn{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.25);}
.risk-hdr{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.risk-agent{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(60,74,66,.18);}
.risk-agent:last-child{border-bottom:none;padding-bottom:0;}
.risk-anm{font-weight:700;font-size:15px;}
.risk-adt{font-size:11px;color:var(--on-dim);margin-top:2px;}
/* Feed */
.feed-c{background:var(--surf-c);border:1px solid rgba(60,74,66,.4);border-radius:12px;padding:14px 16px;}
.feed-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--on-dim);margin-bottom:12px;}
.feed-it{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:4px;}
.feed-txt{font-size:12px;line-height:1.5;}
.feed-time{font-size:10px;color:var(--on-dim);margin-top:2px;}
/* Table */
.tbl-card{background:var(--surf-c);border:1px solid rgba(60,74,66,.4);border-radius:12px;overflow:hidden;}
.tbl-hdr{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(60,74,66,.3);}
.tbl-title{font-size:17px;font-weight:700;}
.tbl-filter{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid rgba(60,74,66,.4);border-radius:8px;padding:7px 12px;color:var(--on-dim);}
.tbl-filter input{background:none;border:none;outline:none;color:var(--on);font-family:'Geist',sans-serif;font-size:13px;width:130px;}
.tbl-filter input::placeholder{color:var(--on-dim);}
.ptbl{width:100%;border-collapse:collapse;}
.ptbl th{padding:10px 20px;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--on-dim);text-align:left;border-bottom:1px solid rgba(60,74,66,.3);cursor:pointer;user-select:none;white-space:nowrap;}
.ptbl th:hover{color:var(--on);}
.ptbl td{padding:13px 20px;border-bottom:1px solid rgba(60,74,66,.12);vertical-align:middle;}
.ptbl tr:last-child td{border-bottom:none;}
.ptbl tr:hover td{background:rgba(78,222,163,.025);}
.ptbl tr{cursor:pointer;}
.ag-cell{display:flex;align-items:center;gap:10px;}
.ag-av{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.ag-nm{font-weight:700;font-size:13px;}
.dn{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;}
/* ═══ AGENT VIEW ═══ */
.lb-banner{background:var(--surf-c);border:1px solid rgba(60,74,66,.4);border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap;}
.lb-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--on-dim);}
.lb-pos-big{font-size:26px;font-weight:800;color:var(--primary);line-height:1;}
.lb-me{display:flex;align-items:center;gap:8px;}
.lb-me-av{width:30px;height:30px;border-radius:50%;overflow:hidden;border:2px solid var(--primary);}
.lb-me-nm{font-weight:700;font-size:15px;}
.lb-others{display:flex;gap:14px;color:var(--on-dim);font-size:12px;margin-left:auto;}
.lb-oth{display:flex;align-items:center;gap:5px;}
.lb-oth-av{width:20px;height:20px;border-radius:50%;overflow:hidden;flex-shrink:0;}
/* Welcome */
.welcome-hdr{font-size:clamp(24px,4vw,38px);font-weight:800;letter-spacing:-.025em;margin-bottom:18px;}
/* Insight */
.insight-c{background:var(--surf-c);border:1px solid rgba(60,74,66,.3);border-left:3px solid var(--primary);border-radius:12px;padding:18px 22px;display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;}
.insight-icon{width:38px;height:38px;background:rgba(78,222,163,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.insight-icon.warn{background:rgba(239,68,68,.1);}
.insight-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:5px;}
.insight-title.warn{color:#f87171;}
.insight-body{font-size:13px;line-height:1.65;color:var(--on-dim);}
/* Metrics row */
.mrow{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.mc{background:var(--surf-c);border:1px solid rgba(60,74,66,.4);border-radius:12px;padding:18px;}
.mc-pct{font-size:11px;font-weight:700;letter-spacing:.05em;margin-bottom:9px;display:flex;align-items:center;gap:4px;}
.mc-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--on-dim);margin-bottom:6px;}
.mc-val{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;line-height:1;}
.mc-tgt{font-size:12px;display:flex;align-items:center;justify-content:space-between;color:var(--on-dim);}
.mc-bar{height:3px;background:rgba(60,74,66,.5);border-radius:2px;margin-top:10px;}
.mc-bf{height:100%;border-radius:2px;background:var(--primary);transition:width 1.2s ease;}
.mc-bf.over{background:var(--primary);}
.mc-bf.crit{background:var(--error);}
.nxt-c{background:var(--surf-c);border:1px solid rgba(60,74,66,.4);border-radius:12px;padding:18px;}
.nxt-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);margin-bottom:7px;}
.nxt-title{font-size:18px;font-weight:800;margin-bottom:7px;line-height:1.2;}
.nxt-desc{font-size:12px;line-height:1.55;color:var(--on-dim);margin-bottom:14px;}
/* Charts row */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.chart-c{background:var(--surf-c);border:1px solid rgba(60,74,66,.4);border-radius:12px;padding:22px;}
.chart-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.chart-sub{font-size:13px;color:var(--on-dim);margin-bottom:20px;line-height:1.55;}
/* Donut */
.donut-wrap{position:relative;width:200px;height:200px;margin:0 auto 16px;}
.donut-ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-pct{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em;}
.donut-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--on-dim);margin-top:4px;}
.donut-extras{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.donut-ex{background:var(--surf-hi);border-radius:8px;padding:12px;}
.donut-ex-l{font-size:10px;color:var(--on-dim);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:4px;}
.donut-ex-v{font-size:15px;font-weight:700;}
/* Bar chart */
.bars-wrap{display:flex;align-items:flex-end;gap:5px;height:110px;margin-bottom:8px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.bar-track{flex:1;width:100%;display:flex;align-items:flex-end;}
.bar{width:100%;border-radius:4px 4px 0 0;background:rgba(60,74,66,.5);transition:height 1.2s ease,background .3s;min-height:4px;}
.bar.hi{background:var(--primary);}
.bar.med{background:rgba(78,222,163,.45);}
.bar-lbl{font-size:9px;color:var(--on-dim);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.bar-lbl.hi{color:var(--primary);}
/* RPC Analysis */
.rpc-tbl{display:flex;flex-direction:column;gap:10px;}
.rpc-row{background:var(--surf-c);border:1px solid rgba(60,74,66,.3);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:14px;}
.rpc-nm{width:72px;font-weight:700;font-size:13px;flex-shrink:0;}
.rpc-track{flex:1;height:20px;background:var(--surf-hi);border-radius:5px;overflow:hidden;position:relative;}
.rpc-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:7px;transition:width 1.2s ease;}
.rpc-fv{font-size:10px;font-weight:700;color:var(--on-primary);white-space:nowrap;}
.rpc-val{width:65px;text-align:right;font-weight:700;font-size:13px;flex-shrink:0;}
.rpc-st{width:22px;flex-shrink:0;}
/* Void table */
.void-tbl{width:100%;border-collapse:collapse;}
.void-tbl th,.void-tbl td{padding:12px 16px;text-align:left;border-bottom:1px solid rgba(60,74,66,.18);}
.void-tbl th{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--on-dim);}
.void-tbl td{font-size:13px;}
.void-tbl tr:last-child td{border-bottom:none;}
/* Mobile nav */

function doLogin(){
  var ext=($('l-ext').value||'').replace(/\s/g,'');

  var btn=$('signin-btn');

  // Field-specific error messages
  if(!ext && !pass){ showErr('Please enter your Extension number and Access Key.'); return; }
  if(!ext){ showErr('Extension is missing — please enter your extension number (e.g. 1002).'); return; }
  if(!pass){ showErr('Access Key is missing — please enter your 6-digit access key.'); return; }
  if(!AGENTS[ext]){ showErr('Extension “'+ext+'” not found. Double-check your extension number.'); return; }

function donut(pctVal,color='#4edea3',size=200,sw=16){
  const r=(size/2)-sw-2;
  const circ=2*Math.PI*r;
  const fill=Math.min(pctVal/100,1)*circ;
  const id='d'+Math.random().toString(36).substr(2,5);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(60,74,66,.4)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-dasharray="${fill} ${circ}" stroke-dashoffset="0"
      transform="rotate(-90 ${size/2} ${size/2})" stroke-linecap="round"/>
  </svg>`;
}

function barChart(daily,maxVal,labels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],todayIdx=4){
  const m=maxVal||Math.max(...daily,1);
  return `<div class="bars-wrap">${daily.map((v,i)=>{
    const h=Math.max((v/m)*100,v>0?8:0);
    const cls=v>0?(v===Math.max(...daily)?'hi':'med'):'';
    return `<div class="bar-col">
      <div class="bar-track"><div class="bar ${cls}" style="height:${h}%;"></div></div>
      <span class="bar-lbl ${cls?'hi':''}">${labels[i]}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderTableRows(agents,q=''){

      a.status==='risk'?`<span class="badge ba">Risk</span>`:
      `<span class="badge br">Critical</span>`;
    const netColor=a.status==='critical'?'color:var(--error)':a.status==='risk'?'color:var(--amber)':'color:var(--primary)';
    return `<tr onclick="viewAgent('${a.ext}')">
      <td><div class="ag-cell"><div class="ag-av">${svgOf(a.ext)}</div><div class="ag-nm">${a.name}</div></div></td>
      <td><span class="dn" style="${netColor}">${fmt(a.net)}</span></td>
      <td><span class="dn" style="${rpcVal>=30?'color:var(--primary)':'color:var(--amber)'}">${fmt(rpcVal)}</span></td>
      <td><span class="dn">${a.cr.toFixed(1)}%</span></td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
}

let _sortCol='rank',_sortAsc=true;
function sortTable(col){
  if(_sortCol===col)_sortAsc=!_sortAsc;else{_sortCol=col;_sortAsc=true;}
  const sorted=[...SORTED].sort((a,b)=>{
    let av=a[col]||+(a.net/a.calls);
    let bv=b[col]||+(b.net/b.calls);
    if(col==='name'){av=a.name;bv=b.name;}
    if(av<bv)return _sortAsc?-1:1;
    if(av>bv)return _sortAsc?1:-1;
    return 0;
  });
  $('tbl-body').innerHTML=renderTableRows(sorted);
}
